name: ask-user-line
version: "1.0"
description: >-
  Lets the agent pause mid-task and ask the LINE user ONE question, rendered as
  native LINE quick-reply chips. Delivered in-band over the OpenAI Responses API:
  the question rides as the ask_user_line function_call's arguments in the
  response the backend reads — no webhook, no spool, no backend round-trip to
  receive it. The tapped chip arrives as a normal text message, so the resume
  leg needs no new code.
