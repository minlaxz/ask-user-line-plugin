name: ask-user-line
version: "1.1"
description: >-
  Lets the agent pause mid-task and ask the LINE user ONE question, rendered as
  native LINE quick-reply chips, and send rich Flex Messages / Flex Carousels
  (send_line_flex). Delivered in-band over the OpenAI Responses API: the
  question/flex spec rides as the function_call's arguments in the response the
  backend reads — no webhook, no spool, no backend round-trip to receive it.
  The tapped chip arrives as a normal text message, so the resume leg needs no
  new code.
